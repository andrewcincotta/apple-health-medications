<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Apple Health Medications</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <main class="app-shell">
    <!-- Landing Page -->
    <section id="landing-page" class="view-container">
      <header class="landing-header">
        <p class="eyebrow">Apple Health Medications</p>
        <h1>Welcome</h1>
      </header>
      
      <div class="user-selection-card">
        <label for="user-select">Select User</label>
        <select id="user-select">
          <option value="" disabled selected>Choose a user...</option>
        </select>
      </div>

      <div id="user-actions" class="user-actions hidden">
        <button id="view-calendar-btn" class="primary-btn">
          <span class="btn-icon">📅</span>
          <span class="btn-text">View Highlights</span>
        </button>
        <button id="view-edit-btn" class="secondary-btn">
          <span class="btn-icon">✏️</span>
          <span class="btn-text">Edit Medications</span>
        </button>
      </div>
    </section>

    <!-- Password Modal -->
    <div id="password-modal" class="modal hidden">
      <div class="modal-content">
        <h2 id="password-modal-title">Enter Password</h2>
        <p id="password-modal-desc">This user's data is password protected.</p>
        <div class="password-input-wrapper">
          <input type="password" id="password-input" placeholder="Password" />
        </div>
        <div class="modal-actions">
          <button id="password-cancel-btn" class="modal-btn-secondary">Cancel</button>
          <button id="password-submit-btn" class="modal-btn-primary">Verify</button>
        </div>
        <p id="password-error" class="error-text hidden">Invalid password. Please try again.</p>
      </div>
    </div>

    <!-- Calendar View -->
    <section id="calendar-view" class="view-container hidden">
      <header class="view-header">
        <button id="back-to-landing-from-calendar" class="back-btn">‹ Back</button>
        <div class="header-content">
          <p class="eyebrow" id="calendar-user-name"></p>
          <h1 id="page-title">Highlights</h1>
        </div>
        <div class="medication-selector-wrapper">
          <select id="medication-select"></select>
        </div>
      </header>

      <section class="status-panel" id="status-panel" role="status" hidden></section>

      <section class="phone-frame" id="medication-view" hidden>
        <article class="highlight-card">
          <div class="med-label">
            <span class="pill-icon" aria-hidden="true">
              <span></span>
              <span></span>
            </span>
            <span id="highlight-name"></span>
          </div>
          <p class="headline" id="highlight-copy"></p>
          <div class="calendar-controls" aria-label="Calendar navigation">
            <button type="button" id="calendar-previous-year" aria-label="Show previous year" title="Previous year">‹‹</button>
            <button type="button" id="calendar-previous" aria-label="Show previous month" title="Previous month">‹</button>
            <p id="calendar-hover-summary" aria-live="polite"></p>
            <button type="button" id="calendar-next" aria-label="Show next month" title="Next month">›</button>
            <button type="button" id="calendar-next-year" aria-label="Show next year" title="Next year">››</button>
          </div>
          <div class="weekday-row" aria-hidden="true">
            <span>S</span>
            <span>M</span>
            <span>T</span>
            <span>W</span>
            <span>T</span>
            <span>F</span>
            <span>S</span>
          </div>
          <div class="calendar-grid" id="calendar-grid" aria-label="Monthly medication log"></div>
          <p class="range-copy" id="range-copy"></p>
        </article>

        <section class="selected-day-section" id="selected-day-section" hidden>
          <h2 id="selected-day-title"></h2>
          <ul class="selected-day-list" id="selected-day-list"></ul>
        </section>

        <div class="section-heading">
          <h2>Details</h2>
          <button type="button" id="refresh-button">Refresh</button>
        </div>
        <article class="details-card">
          <div class="tablet-art" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <h3 id="detail-name"></h3>
            <p id="detail-form">Tablet</p>
            <p id="detail-dose"></p>
          </div>
        </article>
      </section>
    </section>

    <!-- Edit View -->
    <section id="edit-view" class="view-container hidden">
      <header class="view-header">
        <button id="back-to-landing-from-edit" class="back-btn">‹ Back</button>
        <div class="header-content">
          <p class="eyebrow" id="edit-user-name"></p>
          <h1>Managed Medications</h1>
        </div>
        <div class="edit-actions">
          <button id="sync-meds-btn" class="secondary-btn small">
            <span class="btn-icon">🔄</span>
            <span class="btn-text">Sync from History</span>
          </button>
        </div>
      </header>

      <div id="managed-meds-list" class="managed-meds-list">
        <!-- Managed medication cards will be injected here -->
        <p class="status-panel">Loading medications...</p>
      </div>
    </section>
  </main>

  <script src="/app.js" type="module"></script>
</body>

</html>
