services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data

  mcp:
    build: .
    env_file:
      - .env
    command: python mcp_server.py
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8002
      MCP_PATH: /mcp
    ports:
      - "8002:8002"
    volumes:
      - ./data:/data
    restart: always

  sqlite-web:
    image: coleifer/sqlite-web
    ports:
      - "8001:8080"
    volumes:
      - ./data:/data
    command: sqlite_web -H 0.0.0.0 /data/medications.db
    restart: always
