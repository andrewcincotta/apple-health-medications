services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/data

  web:
    build: ./web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8003}:80"
    restart: always

  mcp:
    build: .
    env_file:
      - .env
    command: python mcp_server.py
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: ${MCP_PORT:-8002}
      MCP_PATH: /mcp
    ports:
      - "${MCP_PORT:-8002}:${MCP_PORT:-8002}"
    volumes:
      - ./data:/data
    restart: always

  sqlite-web:
    build:
      context: .
      dockerfile: Dockerfile.sqlite-web
    ports:
      - "${SQLITE_WEB_PORT:-8001}:8080"
    volumes:
      - ./data:/data
    restart: always
